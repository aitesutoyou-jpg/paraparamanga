  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Flipbook Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: #f2f2f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
      color: #1a1a18;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      /* Push everything below iOS status bar */
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #root { height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom)); }
    input[type=range] { cursor: pointer; accent-color: #2563eb; height: 4px; }
    input[type=number] {
      border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px;
      font-size: 14px; background: #fff; color: #1a1a18;

    button { font-family: inherit; cursor: pointer; -webkit-appearance: none; border: none; background: none; }

    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    .backdrop { position: fixed; inset: 0; z-index: 200; }
    .popup {

      border-radius: 16px; padding: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    }
  </style>

};

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function floodFill(ctx,x,y,fc,W,H){
  const[fr,fg,fb]=hexToRgb(fc),img=ctx.getImageData(0,0,W,H),d=img.data;
  x=Math.max(0,Math.min(W-1,Math.floor(x)));y=Math.max(0,Math.min(H-1,Math.floor(y)));
  const b=(y*W+x)*4,[tr,tg,tb,ta]=[d[b],d[b+1],d[b+2],d[b+3]];
  if(tr===fr&&tg===fg&&tb===fb)return;
  const s=[[x,y]];
  while(s.length){
    const[cx,cy]=s.pop();if(cx<0||cy<0||cx>=W||cy>=H)continue;
    const i=(cy*W+cx)*4;if(d[i]!==tr||d[i+1]!==tg||d[i+2]!==tb||d[i+3]!==ta)continue;
    d[i]=fr;d[i+1]=fg;d[i+2]=fb;d[i+3]=255;
    s.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img,0,0);
}

function drawShape(ctx,tool,sx,sy,ex,ey,color,sz){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=sz;ctx.lineCap="round";ctx.lineJoin="round";
  const x=Math.min(sx,ex),y=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);
  ctx.beginPath();
  if(tool==="line"){ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();}
  else if(tool==="rect"){ctx.strokeRect(x,y,w,h);}
  else if(tool==="rectf"){ctx.fillRect(x,y,w,h);}
  else if(tool==="ellipse"||tool==="ellipsef"){
    ctx.ellipse(x+w/2,y+h/2,Math.max(w/2,0.5),Math.max(h/2,0.5),0,0,Math.PI*2);
    tool==="ellipsef"?ctx.fill():ctx.stroke();
  }
}

async function loadImg(ctx,url,w,h){
  return new Promise(r=>{
    ctx.fillStyle=BG;ctx.fillRect(0,0,w,h);
    if(!url){r();return;}
    const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0);r();};img.onerror=r;img.src=url;
  });
}

async function doExport(fd,fc,durs,fps,W,H,onP,onDone,onErr){
  try{
    const off=document.createElement("canvas");off.width=W;off.height=H;
    const ctx=off.getContext("2d"),stream=off.captureStream(60);
    const mime=["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"].find(m=>MediaRecorder.isTypeSupported(m))||"video/webm";
    const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8e6}),chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    rec.onstop=()=>{
      const blob=new Blob(chunks,{type:mime}),url=URL.createObjectURL(blob),a=document.createElement("a");
      a.href=url;a.download="animation.webm";a.click();URL.revokeObjectURL(url);onDone();
    };
    rec.start();
    for(let i=0;i<fc;i++){
      await loadImg(ctx,fd[i],W,H);
      const dur=durs[i]??Math.round(1000/fps),end=performance.now()+dur;
      while(performance.now()<end)await new Promise(r=>setTimeout(r,8));
      onP(Math.round(((i+1)/fc)*100));
    }
    rec.stop();
  }catch(e){onErr(e.message);}
}

// ── Popup helper: position to the right of anchor, clamp to viewport ─
function popupPos(anchorRef, width, height=400){
  const r = anchorRef.current?.getBoundingClientRect();
  if(!r) return {left:80, top:80};
  let left = r.right + 10;
  let top  = r.top;
  const vw = window.innerWidth, vh = window.innerHeight;
  if(left + width  > vw) left = r.left - width - 10;
  if(top  + height > vh) top  = vh - height - 10;
  if(top < 10) top = 10;
  return {left, top};
}

  const pos = popupPos(anchorRef, 280, 460);
  const currentGroup = TOOL_GROUPS.find(g=>g.tools.some(t=>t.id===tool));
  const [activeGroup, setActiveGroup] = useState(currentGroup?.id || "draw");

  return <>
    <div className="backdrop" onPointerDown={onClose}/>

      {/* Group tabs */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {TOOL_GROUPS.map(g=>(
          <button key={g.id} onClick={()=>setActiveGroup(g.id)} style={{
            flex:1,height:36,borderRadius:8,fontSize:13,fontWeight:500,
            background:activeGroup===g.id?C.blue:"transparent",

            color:activeGroup===g.id?"#fff":C.muted,
          }}>{g.label} {g.title}</button>
        ))}
      </div>
      {/* Tools in group */}
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {group.tools.map(t=>{
          const isGrid = t.id==="grid";
          const isActive = isGrid ? showGrid : tool===t.id;
          return (

              display:"flex",alignItems:"center",gap:14,padding:"10px 12px",
              borderRadius:10,cursor:"pointer",
              background:isActive?C.blueBg:"transparent",
              border:`1px solid ${isActive?C.blue:C.border}`,

              <span style={{fontSize:22,width:28,textAlign:"center",flexShrink:0}}>{t.label}</span>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:isActive?C.blue:C.text}}>{t.title}</div>
                <div style={{fontSize:11,color:C.hint,marginTop:2}}>{isGrid?(showGrid?"表示中（タップで非表示）":"中央線・グリッドを表示"):t.desc}</div>
              </div>
              {isActive&&<div style={{marginLeft:"auto",color:C.blue,fontSize:16}}>✓</div>}
            </div>
          );
        })}
      </div>
    </div>
  </>;
}

// ── Main App ──────────────────────────────────────────────────────
function App(){
  const[W,setW]=useState(640);
  const[H,setH]=useState(480);
  const[showRes,setShowRes]=useState(false);
  const[customW,setCustomW]=useState(640);
  const[customH,setCustomH]=useState(480);

  const[frameCount,setFrameCount]=useState(1);
  const[current,setCurrent]=useState(0);
  const fd=useRef({});
  const thumbs=useRef({});
  const[thumbVer,setThumbVer]=useState(0);
  const bump=useCallback(()=>setThumbVer(v=>v+1),[]);

  const[tool,setTool]=useState("pen");
  const[color,setColor]=useState("#000000");
  const[size,setSize]=useState(4);
  const[showOnion,setShowOnion]=useState(true);
  const[customColors,setCustomColors]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(CUSTOM_COLORS_KEY))||[];}catch{return[];}
  });
  const[sketches,setSketches]=useState({});
  const[sketchOpacity,setSketchOpacity]=useState(0.35);
  const[showGrid,setShowGrid]=useState(false);

  const[isPlaying,setIsPlaying]=useState(false);
  const[fps,setFps]=useState(8);
  const[durs,setDurs]=useState([null]);

  const[exporting,setExporting]=useState(false);
  const[exportPct,setExportPct]=useState(0);
  const[toast,setToast]=useState(null);
  const[canUndo,setCanUndo]=useState(false);

  // popup: null | "tool" | "size" | "color" | "fps" | "img"
  const[popup,setPopup]=useState(null);
  const toolBtnRef=useRef(null);
  const sizeBtnRef=useRef(null);
  const colorBtnRef=useRef(null);
  const fpsBtnRef=useRef(null);
  const imgBtnRef=useRef(null);

  const drawC=useRef(null),playC=useRef(null),onionC=useRef(null),imgC=useRef(null);
  const drawing=useRef(false),lastP=useRef(null),shapeStart=useRef(null),snapshotBefore=useRef(null);
  const playTimer=useRef(null);

  // Undo history: per-frame stack of dataURLs (max 20 steps)
  const undoStacks=useRef({}); // {frameIdx: [dataUrl, dataUrl, ...]}
  const MAX_UNDO=20;

  const pushUndo=useCallback((idx)=>{
    const c=drawC.current;if(!c)return;
    const stack=undoStacks.current[idx]||(undoStacks.current[idx]=[]);
    stack.push(c.toDataURL());
    if(stack.length>MAX_UNDO)stack.shift();
    setCanUndo(true);
  },[]);

  const undo=useCallback(()=>{
    const stack=undoStacks.current[current];
    if(!stack||stack.length===0)return;
    const prev=stack.pop();
    const ctx=drawC.current.getContext("2d");
    const img=new Image();
    img.onload=()=>{ctx.clearRect(0,0,W,H);ctx.drawImage(img,0,0,W,H);saveF(current,false);};
    img.src=prev;
    setCanUndo((undoStacks.current[current]||[]).length>0);
  },[current,W,H]);


  const flash=useCallback((msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2200);},[]);

  const openPopup=useCallback(name=>setPopup(p=>p===name?null:name),[]);
  const closePopup=useCallback(()=>setPopup(null),[]);

  const addCustomColor=useCallback((c)=>{
    setCustomColors(prev=>{
      const next=[c,...prev.filter(x=>x!==c)].slice(0,MAX_CUSTOM_COLORS);
      localStorage.setItem(CUSTOM_COLORS_KEY,JSON.stringify(next));
      return next;
    });
  },[]);

  // ── Canvas ops ────────────────────────────────────────────────
  const saveF=useCallback((idx)=>{
    const c=drawC.current;if(!c)return;
    const off=document.createElement("canvas");off.width=c.width;off.height=c.height;
    const ctx=off.getContext("2d");
    ctx.fillStyle=BG;ctx.fillRect(0,0,c.width,c.height);
    const sk=sketches[idx];
    if(sk){
      try{const si=new Image();si.src=sk;ctx.globalAlpha=sketchOpacity;ctx.drawImage(si,0,0,c.width,c.height);ctx.globalAlpha=1;}catch(e){}
    }
    ctx.drawImage(c,0,0);
    const d=off.toDataURL();fd.current[idx]=d;thumbs.current[idx]=d;bump();
  },[bump,sketches,sketchOpacity]);

  const renderF=useCallback((idx,w,h)=>{
    const c=drawC.current;if(!c)return;
    const ctx=c.getContext("2d");
    ctx.clearRect(0,0,w,h);ctx.fillStyle=BG;ctx.fillRect(0,0,w,h);
    const data=fd.current[idx];
    if(data){
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,w,h);ctx.fillStyle=BG;ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);};
      img.src=data;
    }
  },[]);

  const renderOnion=useCallback((idx,onion,w,h)=>{
    const c=onionC.current;if(!c)return;
    const ctx=c.getContext("2d");
    ctx.clearRect(0,0,w,h);
    if(onion&&idx>0&&fd.current[idx-1]){
      const p=new Image();
      p.onload=()=>{ctx.clearRect(0,0,w,h);ctx.globalAlpha=0.25;ctx.drawImage(p,0,0,w,h);ctx.globalAlpha=1;};
      p.src=fd.current[idx-1];
    }
  },[]);

  const renderSketch=useCallback((idx,opacity,w,h)=>{
    const c=imgC.current;if(!c)return;
    const ctx=c.getContext("2d");ctx.clearRect(0,0,w,h);
    const sk=sketches[idx];
    if(sk){
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,w,h);ctx.globalAlpha=opacity;ctx.drawImage(img,0,0,w,h);ctx.globalAlpha=1;};
      img.src=sk;
    }
  },[sketches]);

  useEffect(()=>{
    if(!isPlaying){
      renderF(current,W,H);
      renderOnion(current,showOnion,W,H);
      renderSketch(current,sketchOpacity,W,H);
    }
  },[current,showOnion,sketchOpacity,sketches,W,H,renderF,renderOnion,renderSketch,isPlaying]);

  useEffect(()=>{
    [drawC,playC,onionC,imgC].forEach(ref=>{
      const c=ref.current;if(!c)return;
      c.width=W;c.height=H;
    });
    renderF(current,W,H);renderOnion(current,showOnion,W,H);renderSketch(current,sketchOpacity,W,H);
  },[W,H]);

  useEffect(()=>{
    if(!isPlaying){clearTimeout(playTimer.current);return;}
    let idx=0;
    const step=()=>{
      const c=playC.current;if(!c)return;
      const ctx=c.getContext("2d");ctx.clearRect(0,0,W,H);ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
      const data=fd.current[idx];
      const next=()=>{const dur=durs[idx]??Math.round(1000/fps);idx=(idx+1)%frameCount;playTimer.current=setTimeout(step,dur);};
      if(data){const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,W,H);next();};img.onerror=next;img.src=data;}else next();
    };
    step();return()=>clearTimeout(playTimer.current);
  },[isPlaying,fps,frameCount,durs,W,H]);

  const applyRes=(nw,nh)=>{
    const keys=Object.keys(fd.current);
    if(!keys.length){setW(nw);setH(nh);setShowRes(false);return;}
    let done=0;const nd={};
    keys.forEach(k=>{
      const src=fd.current[k];if(!src){chk();return;}
      const off=document.createElement("canvas");off.width=nw;off.height=nh;
      const ctx=off.getContext("2d");ctx.fillStyle=BG;ctx.fillRect(0,0,nw,nh);
      const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,nw,nh);nd[k]=off.toDataURL();chk();};img.onerror=chk;img.src=src;
    });
    function chk(){done++;if(done===keys.length){fd.current=nd;thumbs.current=nd;setW(nw);setH(nh);bump();setShowRes(false);}}
  };

  const isShapeTool=TOOL_GROUPS[1].tools.some(t2=>t2.id===tool);
  const activeTool=ALL_TOOLS.find(t=>t.id===tool)||ALL_TOOLS[0];
  const activeGroup=TOOL_GROUPS.find(g=>g.tools.some(t=>t.id===tool));

  const gp=e=>{
    const r=drawC.current.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
  };

  // Symmetry pen: draw a stamp/line segment mirrored across vertical center
  const mirrorX = x => W - x;

  const drawStamp=(ctx,x,y)=>{
    if(tool==="brush"){
      for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,r=Math.random()*size*2;ctx.beginPath();ctx.arc(x+Math.cos(a)*r,y+Math.sin(a)*r,size*0.3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();}
    }else{
      ctx.beginPath();ctx.arc(x,y,size/2,0,Math.PI*2);ctx.fillStyle=tool==="eraser"?BG:color;ctx.fill();
    }
  };
  const drawStroke=(ctx,fromX,fromY,toX,toY)=>{
    if(tool==="brush"){
      const dx=toX-fromX,dy=toY-fromY,dist=Math.sqrt(dx*dx+dy*dy),steps=Math.max(1,Math.floor(dist/5));
      for(let s=0;s<=steps;s++){const tx=fromX+dx*(s/steps),ty=fromY+dy*(s/steps);for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,r=Math.random()*size*2;ctx.beginPath();ctx.arc(tx+Math.cos(a)*r,ty+Math.sin(a)*r,size*0.3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();}}
    }else{
      ctx.beginPath();ctx.moveTo(fromX,fromY);ctx.lineTo(toX,toY);
      ctx.strokeStyle=tool==="eraser"?BG:color;ctx.lineWidth=size;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();
    }
  };

  const startDraw=e=>{
    if(isPlaying)return;e.preventDefault();closePopup();
    const pos=gp(e);

    if(tool==="eyedrop"){
      const ctx=drawC.current.getContext("2d");
      const px=ctx.getImageData(Math.floor(pos.x),Math.floor(pos.y),1,1).data;
      const hex="#"+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,"0")).join("");
      setColor(hex);addCustomColor(hex);
      return;
    }

    if(tool==="fill"){
      pushUndo(current);
      floodFill(drawC.current.getContext("2d"),pos.x,pos.y,color,W,H);saveF(current);return;
    }

    pushUndo(current);
    drawing.current=true;lastP.current=pos;
    if(isShapeTool){shapeStart.current=pos;snapshotBefore.current=drawC.current.toDataURL();return;}

    const ctx=drawC.current.getContext("2d");
    drawStamp(ctx,pos.x,pos.y);
    if(tool==="symmetry")drawStamp(ctx,mirrorX(pos.x),pos.y);
  };

  const onDraw=e=>{
    if(!drawing.current||isPlaying)return;e.preventDefault();
    const pos=gp(e),ctx=drawC.current.getContext("2d");
    if(isShapeTool){
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,W,H);ctx.drawImage(img,0,0,W,H);drawShape(ctx,tool,shapeStart.current.x,shapeStart.current.y,pos.x,pos.y,color,size);};
      img.src=snapshotBefore.current;return;
    }
    drawStroke(ctx,lastP.current.x,lastP.current.y,pos.x,pos.y);
    if(tool==="symmetry"){
      drawStroke(ctx,mirrorX(lastP.current.x),lastP.current.y,mirrorX(pos.x),pos.y);
    }
    lastP.current=pos;
  };

  const endDraw=e=>{
    if(!drawing.current)return;
    if(isShapeTool&&e){
      const pos=gp(e),ctx=drawC.current.getContext("2d");
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,W,H);ctx.drawImage(img,0,0,W,H);drawShape(ctx,tool,shapeStart.current.x,shapeStart.current.y,pos.x,pos.y,color,size);drawing.current=false;saveF(current);};
      img.src=snapshotBefore.current;return;
    }
    drawing.current=false;saveF(current);
  };

  const switchF=idx=>{
    saveF(current);setCurrent(idx);
    setCanUndo((undoStacks.current[idx]||[]).length>0);
  };
  const addFrame=()=>{
    if(frameCount>=MAX_FRAMES)return;saveF(current);
    const ni=current+1,nfd={},nth={},nundo={};
    for(let k=0;k<frameCount;k++){
      const ki=k>=ni?k+1:k;
      if(fd.current[k]){nfd[ki]=fd.current[k];nth[ki]=thumbs.current[k];}
      if(undoStacks.current[k]){nundo[ki]=undoStacks.current[k];}
    }
    fd.current=nfd;thumbs.current=nth;undoStacks.current=nundo;
    setDurs(d=>{const n=[...d];n.splice(ni,0,null);return n;});
    setFrameCount(fc=>fc+1);setCurrent(ni);setCanUndo(false);
  };
  const deleteFrame=()=>{
    if(frameCount<=1)return;const di=current,nfd={},nth={},nundo={};
    for(let k=0;k<frameCount;k++){
      if(k===di)continue;
      const ki=k>di?k-1:k;
      if(fd.current[k]){nfd[ki]=fd.current[k];nth[ki]=thumbs.current[k];}
      if(undoStacks.current[k]){nundo[ki]=undoStacks.current[k];}
    }
    fd.current=nfd;thumbs.current=nth;undoStacks.current=nundo;
    setDurs(d=>{const n=[...d];n.splice(di,1);return n;});
    setFrameCount(fc=>fc-1);
    const nc=Math.min(di,frameCount-2);setCurrent(nc);
    setCanUndo((undoStacks.current[nc]||[]).length>0);
    setTimeout(()=>renderF(nc,W,H),30);
  };
  const clearFrame=()=>{
    pushUndo(current);
    const ctx=drawC.current.getContext("2d");ctx.clearRect(0,0,W,H);ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    delete fd.current[current];delete thumbs.current[current];bump();
  };

  const saveJSON=()=>{
    saveF(current);
    const p={version:3,frameCount,fps,W,H,durs,sketches,
      frames:Object.fromEntries(Array.from({length:frameCount},(_,i)=>[i,fd.current[i]??null]))};
    const url=URL.createObjectURL(new Blob([JSON.stringify(p)],{type:"application/json"}));
    const a=document.createElement("a");
    a.href=url;a.download=`flipbook_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);flash("JSONに保存しました");
  };
  const loadJSON=file=>{
    const r=new FileReader();r.onload=e=>{
      try{
        const p=JSON.parse(e.target.result),fc=p.frameCount||1;
        fd.current={};thumbs.current={};
        for(let i=0;i<fc;i++)if(p.frames[i]){fd.current[i]=p.frames[i];thumbs.current[i]=p.frames[i];}
        setFrameCount(fc);setDurs(p.durs||Array(fc).fill(null));
        if(p.fps)setFps(p.fps);if(p.W&&p.H){setW(p.W);setH(p.H);}
        if(p.sketches)setSketches(p.sketches);
        setCurrent(0);bump();flash("読み込みました");
      }catch{flash("読み込み失敗",false);}
    };r.readAsText(file);
  };
  const importImage=(file,mode)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const url=e.target.result;const img=new Image();
      img.onload=()=>{
        if(mode==="merge"){
          const ctx=drawC.current.getContext("2d");
          const sc=Math.min(W/img.width,H/img.height);
          const dw=img.width*sc,dh=img.height*sc,dx=(W-dw)/2,dy=(H-dh)/2;
          ctx.drawImage(img,dx,dy,dw,dh);saveF(current);flash("画像を合成しました");
        }else{
          const off=document.createElement("canvas");off.width=W;off.height=H;
          const ctx=off.getContext("2d");
          const sc=Math.min(W/img.width,H/img.height);
          const dw=img.width*sc,dh=img.height*sc,dx=(W-dw)/2,dy=(H-dh)/2;
          ctx.drawImage(img,dx,dy,dw,dh);
          setSketches(prev=>({...prev,[current]:off.toDataURL()}));
          flash("下絵を設定しました");
        }
        closePopup();
      };
      img.src=url;
    };
    reader.readAsDataURL(file);
  };
  const clearSketch=()=>{setSketches(prev=>{const n={...prev};delete n[current];return n;});flash("下絵を削除しました");};

  const handleExport=async()=>{
    saveF(current);setExporting(true);setExportPct(0);
    await doExport(fd.current,frameCount,durs,fps,W,H,p=>setExportPct(p),()=>{setExporting(false);flash("書き出し完了");},e=>{setExporting(false);flash("エラー: "+e,false);});
  };

  const defDur=Math.round(1000/fps);
  const cursorStyle=isShapeTool?"crosshair":tool==="eraser"?"cell":"crosshair";

  return(
    <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {toast&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",
          background:toast.ok?"#f0fdf4":"#fef2f2",color:toast.ok?"#15803d":C.red,
          padding:"8px 18px",borderRadius:22,fontSize:14,fontWeight:500,
          border:`1px solid ${toast.ok?"#bbf7d0":"#fecaca"}`,
          zIndex:9999,pointerEvents:"none",whiteSpace:"nowrap",
          boxShadow:"0 2px 12px rgba(0,0,0,0.12)"}}>
          {toast.msg}
        </div>
      )}

      {/* Popups */}
      {popup==="tool"&&<ToolPopup tool={tool} showGrid={showGrid}
        onSelect={t=>{ if(t==="grid"){ setShowGrid(g=>!g); } else { setTool(t); closePopup(); } }}
        onClose={closePopup} anchorRef={toolBtnRef}/>}
      {popup==="size"&&<SizePopup size={size} onSelect={setSize} onClose={closePopup} anchorRef={sizeBtnRef}/>}
      {popup==="color"&&<ColorPopup color={color} customColors={customColors} onSelect={setColor} onAddCustom={addCustomColor} onClose={closePopup} anchorRef={colorBtnRef}/>}
      {popup==="fps"&&<FpsPopup fps={fps} onSelect={setFps} onClose={closePopup} anchorRef={fpsBtnRef}/>}
      {popup==="img"&&<ImagePopup onImport={importImage} onClearSketch={clearSketch} hasSketch={!!sketches[current]} sketchOpacity={sketchOpacity} onOpacity={setSketchOpacity} onClose={closePopup} anchorRef={imgBtnRef}/>}

      {/* ── Top bar ── */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,
        padding:"0 12px",height:52,display:"flex",alignItems:"center",gap:6,flexShrink:0}}>

        <Btn onClick={saveJSON} style={{height:40,padding:"0 12px",fontSize:13}}>💾</Btn>
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",
          height:40,padding:"0 12px",background:C.panel,border:`1px solid ${C.border}`,
          borderRadius:10,cursor:"pointer",fontSize:13,color:C.text,flexShrink:0}}>
          📂<input type="file" accept=".json" style={{display:"none"}}
            onChange={e=>{if(e.target.files[0])loadJSON(e.target.files[0]);e.target.value="";}}/>
        </label>

        <div style={{width:1,height:20,background:C.border}}/>

        {/* Undo */}
        <button onClick={undo} disabled={!canUndo} style={{
          height:40,padding:"0 12px",
          background:C.panel,border:`1px solid ${C.border}`,
          borderRadius:10,fontSize:16,color:canUndo?C.text:C.hint,
          opacity:canUndo?1:0.4}}>
          ↶
        </button>

        <div style={{width:1,height:20,background:C.border}}/>
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowRes(p=>!p)} style={{
            height:40,padding:"0 10px",background:C.panel,border:`1px solid ${C.border}`,
            borderRadius:10,fontSize:12,color:C.muted,display:"flex",alignItems:"center",gap:4}}>
            ⊡ {W}×{H}
          </button>
          {showRes&&(
            <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,zIndex:300,
              background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,padding:8,
              minWidth:180,boxShadow:"0 8px 24px rgba(0,0,0,0.12)"}}>
              {PRESETS.map(p=>(
                <div key={p.label} onClick={()=>applyRes(p.w,p.h)} style={{
                  padding:"10px 14px",borderRadius:8,cursor:"pointer",fontSize:13,
                  background:W===p.w&&H===p.h?C.blueBg:"transparent",
                  color:W===p.w&&H===p.h?C.blue:C.text}}>{p.label}</div>
              ))}
              <div style={{borderTop:`1px solid ${C.border}`,marginTop:6,paddingTop:8,
                display:"flex",gap:6,alignItems:"center",paddingLeft:4}}>
                <input type="number" value={customW} onChange={e=>setCustomW(Number(e.target.value))} style={{width:58,padding:"6px 8px",fontSize:12}}/>
                <span style={{color:C.hint,fontSize:12}}>×</span>
                <input type="number" value={customH} onChange={e=>setCustomH(Number(e.target.value))} style={{width:58,padding:"6px 8px",fontSize:12}}/>
                <Btn onClick={()=>applyRes(customW,customH)} style={{height:34,fontSize:12,padding:"0 8px"}}>適用</Btn>
              </div>
            </div>
          )}
        </div>

        {/* Onion */}
        <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",
          padding:"0 10px",height:40,borderRadius:10,fontSize:13,color:C.muted,
          background:showOnion?C.blueBg:C.panel,
          border:`1px solid ${showOnion?C.blue:C.border}`,flexShrink:0}}>
          <input type="checkbox" checked={showOnion} onChange={e=>setShowOnion(e.target.checked)} style={{display:"none"}}/>
          オニオン
        </label>

        <div style={{flex:1}}/>

        {/* Play */}
        <button onClick={()=>setIsPlaying(p=>!p)} style={{
          height:40,padding:"0 16px",
          background:isPlaying?C.redBg:C.blueBg,
          border:`1px solid ${isPlaying?C.red:C.blue}`,
          borderRadius:10,color:isPlaying?C.red:C.blue,fontSize:16,fontWeight:700}}>
          {isPlaying?"⏹":"▶"}
        </button>

        {/* FPS popup button */}
        <button ref={fpsBtnRef} onClick={()=>openPopup("fps")} style={{
          height:40,padding:"0 12px",
          background:popup==="fps"?C.blueBg:C.panel,
          border:`1px solid ${popup==="fps"?C.blue:C.border}`,
          borderRadius:10,fontSize:13,color:popup==="fps"?C.blue:C.muted,
          display:"flex",alignItems:"center",gap:4}}>
          {fps}<span style={{fontSize:10,color:C.hint}}>fps</span>
        </button>

        <div style={{width:1,height:20,background:C.border}}/>
        <Btn onClick={handleExport} primary disabled={exporting} style={{height:40,fontSize:13}}>
          {exporting?`${exportPct}%`:"▶ 書き出し"}
        </Btn>
      </div>

      {/* ── Body ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}} onClick={()=>setShowRes(false)}>

        {/* Left sidebar — compact, popup-based */}
        <div style={{width:64,background:C.panel,borderRight:`1px solid ${C.border}`,
          display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"10px 0",
          flexShrink:0,zIndex:100}}>

          {/* Tool button — shows current tool, opens popup */}
          <button ref={toolBtnRef} onClick={()=>openPopup("tool")} style={{
            width:50,height:50,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",gap:3,
            background:popup==="tool"?C.blueBg:"transparent",
            border:`1.5px solid ${popup==="tool"?C.blue:C.border}`,borderRadius:10,
          }}>
            <span style={{fontSize:22}}>{activeTool.label}</span>
            <span style={{fontSize:9,color:popup==="tool"?C.blue:C.hint,maxWidth:46,overflow:"hidden",
              whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{activeTool.title}</span>
          </button>

          <div style={{width:36,height:1,background:C.border}}/>

          {/* Size */}
          <button ref={sizeBtnRef} onClick={()=>openPopup("size")} style={{
            width:50,height:46,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",gap:3,
            background:popup==="size"?C.blueBg:"transparent",
            border:`1.5px solid ${popup==="size"?C.blue:C.border}`,borderRadius:10,
          }}>
            <div style={{borderRadius:99,background:popup==="size"?C.blue:C.muted,
              width:Math.min(size*1.6,36),height:Math.min(size*0.8,10),minWidth:3,minHeight:3}}/>
            <span style={{fontSize:10,color:popup==="size"?C.blue:C.hint}}>{size}px</span>
          </button>

          {/* Color */}
          <button ref={colorBtnRef} onClick={()=>openPopup("color")} style={{
            width:50,height:50,display:"flex",alignItems:"center",justifyContent:"center",
            background:"transparent",
            border:`1.5px solid ${popup==="color"?C.blue:C.border}`,borderRadius:10,
          }}>
            <div style={{width:34,height:34,borderRadius:8,background:color,
              border:"1px solid rgba(0,0,0,0.1)",
              boxShadow:popup==="color"?`0 0 0 2px ${C.blue}`:"none"}}/>
          </button>

          {/* Image */}
          <button ref={imgBtnRef} onClick={()=>openPopup("img")} style={{
            width:50,height:50,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",gap:2,position:"relative",
            background:popup==="img"?C.greenBg:"transparent",
            border:`1.5px solid ${popup==="img"?C.green:sketches[current]?C.green:C.border}`,borderRadius:10,
          }}>
            <span style={{fontSize:20}}>🖼</span>
            {sketches[current]&&<div style={{position:"absolute",top:5,right:5,
              width:7,height:7,borderRadius:99,background:C.green}}/>}
          </button>
        </div>

        {/* Center */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:8,gap:6}}>
          {/* Frame info + duration */}
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <span style={{fontSize:12,color:C.muted,minWidth:90}}>
              {current+1} / {frameCount}
            </span>
            <span style={{fontSize:11,color:C.hint,flexShrink:0}}>表示時間</span>
            <input type="range" min={16} max={2000} step={8}
              value={durs[current]??defDur}
              onChange={e=>setDurs(d=>{const n=[...d];n[current]=parseInt(e.target.value);return n;})}
              style={{flex:1}}/>
            <input type="number" min={16} max={5000} step={8}
              value={durs[current]??defDur}
              onChange={e=>setDurs(d=>{const n=[...d];n[current]=Math.max(16,parseInt(e.target.value)||defDur);return n;})}
              style={{width:62,textAlign:"right",padding:"4px 6px",fontSize:12}}/>
            <span style={{fontSize:11,color:C.hint,flexShrink:0}}>ms</span>
            <button onClick={()=>setDurs(d=>{const n=[...d];n[current]=null;return n;})}
              style={{height:34,width:34,background:C.panel,border:`1px solid ${C.border}`,
                borderRadius:8,fontSize:13,color:C.muted,flexShrink:0}}>↺</button>
          </div>

          {/* Canvas */}
          <div style={{flex:1,position:"relative",borderRadius:10,overflow:"hidden",
            border:`1px solid ${C.border}`,background:BG}}>
            <canvas ref={imgC} width={W} height={H}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>
            <canvas ref={drawC} width={W} height={H}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",
                touchAction:"none",cursor:cursorStyle,display:isPlaying?"none":"block"}}
              onMouseDown={startDraw} onMouseMove={onDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
              onTouchStart={startDraw} onTouchMove={onDraw} onTouchEnd={endDraw}/>
            <canvas ref={onionC} width={W} height={H}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",
                pointerEvents:"none",display:isPlaying?"none":"block"}}/>
            <canvas ref={playC} width={W} height={H}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",
                display:isPlaying?"block":"none"}}/>
            {/* Guide grid overlay */}
            {showGrid&&!isPlaying&&(
              <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
                {/* center vertical */}
                <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:"rgba(37,99,235,0.4)"}}/>
                {/* center horizontal */}
                <div style={{position:"absolute",top:"50%",left:0,right:0,height:1,background:"rgba(37,99,235,0.4)"}}/>
                {/* thirds */}
                <div style={{position:"absolute",left:"33.333%",top:0,bottom:0,width:1,background:"rgba(37,99,235,0.15)"}}/>
                <div style={{position:"absolute",left:"66.666%",top:0,bottom:0,width:1,background:"rgba(37,99,235,0.15)"}}/>
                <div style={{position:"absolute",top:"33.333%",left:0,right:0,height:1,background:"rgba(37,99,235,0.15)"}}/>
                <div style={{position:"absolute",top:"66.666%",left:0,right:0,height:1,background:"rgba(37,99,235,0.15)"}}/>
              </div>
            )}
          </div>

          {/* Frame actions */}
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>current>0&&switchF(current-1)}
              style={{height:42,width:42,background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,fontSize:16,color:C.muted,flexShrink:0}}>◀</button>
            <button onClick={()=>current<frameCount-1&&switchF(current+1)}
              style={{height:42,width:42,background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,fontSize:16,color:C.muted,flexShrink:0}}>▶</button>
            <Btn onClick={addFrame} style={{flex:1,height:42,fontSize:13}}>＋ 追加</Btn>
            <Btn onClick={deleteFrame} danger style={{flex:1,height:42,fontSize:13}}>✕ 削除</Btn>
            <Btn onClick={clearFrame} style={{flex:1,height:42,fontSize:13}}>⌫ クリア</Btn>
          </div>
        </div>

        {/* Filmstrip */}
        <div style={{width:96,background:C.panel,borderLeft:`1px solid ${C.border}`,
          display:"flex",flexDirection:"column",padding:8,gap:5,flexShrink:0}}>
          <div style={{fontSize:10,color:C.hint,textAlign:"center",letterSpacing:"0.08em",flexShrink:0}}>FRAMES</div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {Array.from({length:frameCount},(_,i)=>(
              <div key={`${i}-${thumbVer}`} onClick={()=>switchF(i)} style={{
                position:"relative",borderRadius:5,overflow:"hidden",cursor:"pointer",flexShrink:0,
                border:`2px solid ${current===i?C.blue:C.border}`,
                background:BG,aspectRatio:`${W}/${H}`,
                boxShadow:current===i?"0 0 0 3px #bfdbfe":"none",
              }}>
                {thumbs.current[i]
                  ?<img src={thumbs.current[i]} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} alt=""/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:C.hint,fontSize:9}}>—</div>
                }
                <div style={{position:"absolute",bottom:1,right:2,fontSize:8,
                  color:current===i?C.blue:C.hint,lineHeight:1,fontWeight:600}}>{i+1}</div>
                {durs[i]!=null&&<div style={{position:"absolute",top:1,left:2,fontSize:7,
                  color:"#d97706",lineHeight:1}}>{durs[i]}</div>}
                {sketches[i]&&<div style={{position:"absolute",top:2,right:2,width:5,height:5,
                  borderRadius:99,background:C.green}}/>}
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
