<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Flipbook Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: #f2f2f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
      color: #1a1a18;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    input[type=range] { cursor: pointer; accent-color: #2563eb; height: 4px; }
    input[type=number] {
      border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px;
      font-size: 13px; background: #fff; color: #1a1a18;
      font-family: inherit; -webkit-appearance: none;
    }
    input[type=color] { border: none; padding: 0; cursor: pointer; background: none; }
    button { font-family: inherit; cursor: pointer; -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const MAX_FRAMES = 60;
const STORAGE_KEY = "flipbook_v5";
const BG = "#ffffff";

// iPad Pro 11" / Air 5 / iPad 10th: 1620×2160 (portrait) → CSS ~810×1080 at 2x
// We treat as landscape: width=1080, height=810 CSS px
// Default canvas = 16:12 ratio to match iPad drawing area

const PRESETS = [
  { label: "1080×810",  w: 1080, h: 810  },
  { label: "1280×720",  w: 1280, h: 720  },
  { label: "640×480",   w: 640,  h: 480  },
  { label: "400×300",   w: 400,  h: 300  },
];

const SWATCHES = [
  "#000000","#1e293b","#64748b","#cbd5e1","#ffffff",
  "#ef4444","#f97316","#eab308","#22c55e","#3b82f6",
  "#a855f7","#ec4899","#06b6d4","#84cc16","#f59e0b",
];

const TOOLS = [
  { id:"pen",      label:"✏",  title:"ペン",       shape:false },
  { id:"brush",    label:"◎",  title:"ブラシ",     shape:false },
  { id:"eraser",   label:"⌫",  title:"消しゴム",   shape:false },
  { id:"fill",     label:"◈",  title:"塗りつぶし", shape:false },
  { id:"line",     label:"╱",  title:"直線",       shape:true  },
  { id:"rect",     label:"□",  title:"四角（枠）", shape:true  },
  { id:"rectf",    label:"■",  title:"四角（塗）", shape:true  },
  { id:"ellipse",  label:"◯",  title:"丸（枠）",   shape:true  },
  { id:"ellipsef", label:"●",  title:"丸（塗）",   shape:true  },
];

const SIZES = [2, 4, 8, 16, 28];

const C = {
  bg:      "#f2f2f0",
  panel:   "#ffffff",
  border:  "#e0e0dd",
  muted:   "#8a8a86",
  hint:    "#b8b8b4",
  blue:    "#2563eb",
  blueBg:  "#eff6ff",
  red:     "#dc2626",
  redBg:   "#fef2f2",
  text:    "#1a1a18",
};

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function floodFill(ctx,x,y,fc,W,H){
  const[fr,fg,fb]=hexToRgb(fc),img=ctx.getImageData(0,0,W,H),d=img.data;
  x=Math.max(0,Math.min(W-1,Math.floor(x)));y=Math.max(0,Math.min(H-1,Math.floor(y)));
  const b=(y*W+x)*4,[tr,tg,tb,ta]=[d[b],d[b+1],d[b+2],d[b+3]];
  if(tr===fr&&tg===fg&&tb===fb)return;
  const s=[[x,y]];
  while(s.length){
    const[cx,cy]=s.pop();
    if(cx<0||cy<0||cx>=W||cy>=H)continue;
    const i=(cy*W+cx)*4;
    if(d[i]!==tr||d[i+1]!==tg||d[i+2]!==tb||d[i+3]!==ta)continue;
    d[i]=fr;d[i+1]=fg;d[i+2]=fb;d[i+3]=255;
    s.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img,0,0);
}

function drawShape(ctx,tool,sx,sy,ex,ey,color,sz){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=sz;
  ctx.lineCap="round";ctx.lineJoin="round";
  const x=Math.min(sx,ex),y=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);
  ctx.beginPath();
  if(tool==="line"){ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();}
  else if(tool==="rect"){ctx.strokeRect(x,y,w,h);}
  else if(tool==="rectf"){ctx.fillRect(x,y,w,h);}
  else if(tool==="ellipse"||tool==="ellipsef"){
    ctx.ellipse(x+w/2,y+h/2,Math.max(w/2,0.5),Math.max(h/2,0.5),0,0,Math.PI*2);
    tool==="ellipsef"?ctx.fill():ctx.stroke();
  }
}

async function loadImg(ctx,url,w,h){
  return new Promise(r=>{
    ctx.fillStyle=BG;ctx.fillRect(0,0,w,h);
    if(!url){r();return;}
    const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0);r();};img.onerror=r;img.src=url;
  });
}

async function doExport(fd,fc,durs,fps,W,H,onP,onDone,onErr){
  try{
    const off=document.createElement("canvas");off.width=W;off.height=H;
    const ctx=off.getContext("2d"),stream=off.captureStream(60);
    const mime=["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"].find(m=>MediaRecorder.isTypeSupported(m))||"video/webm";
    const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8e6}),chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    rec.onstop=()=>{
      const blob=new Blob(chunks,{type:mime}),url=URL.createObjectURL(blob),a=document.createElement("a");
      a.href=url;a.download="animation.webm";a.click();URL.revokeObjectURL(url);onDone();
    };
    rec.start();
    for(let i=0;i<fc;i++){
      await loadImg(ctx,fd[i],W,H);
      const dur=durs[i]??Math.round(1000/fps),end=performance.now()+dur;
      while(performance.now()<end)await new Promise(r=>setTimeout(r,8));
      onP(Math.round(((i+1)/fc)*100));
    }
    rec.stop();
  }catch(e){onErr(e.message);}
}

// ── UI atoms ─────────────────────────────────────────────────────
function ToolBtn({label,active,onClick,title}){
  return(
    <button onClick={onClick} title={title} style={{
      width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",
      background:active?C.blueBg:"transparent",
      border:`1.5px solid ${active?C.blue:C.border}`,
      borderRadius:10,color:active?C.blue:C.muted,
      fontSize:18,flexShrink:0,transition:"background 0.1s,border-color 0.1s",
    }}>{label}</button>
  );
}

function Btn({children,onClick,primary,danger,disabled,style={}}){
  return(
    <button onClick={onClick} disabled={disabled} style={{
      display:"flex",alignItems:"center",justifyContent:"center",gap:6,
      height:44,padding:"0 14px",
      background:primary?C.blue:danger?C.redBg:C.panel,
      border:`1px solid ${primary?C.blue:danger?C.red:C.border}`,
      borderRadius:10,color:primary?"#fff":danger?C.red:C.text,
      fontSize:14,opacity:disabled?0.4:1,whiteSpace:"nowrap",flexShrink:0,...style,
    }}>{children}</button>
  );
}

function Panel({children,style={}}){
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,
      padding:10,...style}}>
      {children}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────
function App(){
  const dpr = window.devicePixelRatio || 1;

  const[W,setW]=useState(1080);
  const[H,setH]=useState(810);
  const[showRes,setShowRes]=useState(false);
  const[customW,setCustomW]=useState(1080);
  const[customH,setCustomH]=useState(810);

  const[frameCount,setFrameCount]=useState(1);
  const[current,setCurrent]=useState(0);
  const fd=useRef({});
  const thumbs=useRef({});
  const[thumbVer,setThumbVer]=useState(0);
  const bump=useCallback(()=>setThumbVer(v=>v+1),[]);

  const[tool,setTool]=useState("pen");
  const[color,setColor]=useState("#000000");
  const[size,setSize]=useState(4);
  const[showOnion,setShowOnion]=useState(true);

  const[isPlaying,setIsPlaying]=useState(false);
  const[fps,setFps]=useState(8);
  const[durs,setDurs]=useState([null]);

  const[exporting,setExporting]=useState(false);
  const[exportPct,setExportPct]=useState(0);
  const[toast,setToast]=useState(null);

  // Panels
  const[showSizePanel,setShowSizePanel]=useState(false);
  const[showColorPanel,setShowColorPanel]=useState(false);

  const drawC=useRef(null),playC=useRef(null),onionC=useRef(null);
  const drawing=useRef(false),lastP=useRef(null),shapeStart=useRef(null),snapshotBefore=useRef(null);
  const playTimer=useRef(null);

  const flash=useCallback((msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2200);},[]);

  // Save: composite draw canvas onto white offscreen
  const saveF=useCallback((idx)=>{
    const c=drawC.current;if(!c)return;
    const off=document.createElement("canvas");off.width=c.width;off.height=c.height;
    const ctx=off.getContext("2d");ctx.fillStyle=BG;ctx.fillRect(0,0,off.width,off.height);
    ctx.drawImage(c,0,0);
    const d=off.toDataURL();fd.current[idx]=d;thumbs.current[idx]=d;bump();
  },[bump]);

  // Render frame content onto draw canvas (no onion)
  const renderF=useCallback((idx,w,h)=>{
    const c=drawC.current;if(!c)return;
    const ctx=c.getContext("2d");ctx.clearRect(0,0,w*dpr,h*dpr);
    const data=fd.current[idx];
    if(data){
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,w*dpr,h*dpr);ctx.drawImage(img,0,0,w*dpr,h*dpr);};
      img.src=data;
    }
  },[dpr]);

  // Render onion onto onion canvas
  const renderOnion=useCallback((idx,onion,w,h)=>{
    const c=onionC.current;if(!c)return;
    const ctx=c.getContext("2d");ctx.clearRect(0,0,w*dpr,h*dpr);
    if(onion&&idx>0&&fd.current[idx-1]){
      const p=new Image();
      p.onload=()=>{ctx.clearRect(0,0,w*dpr,h*dpr);ctx.globalAlpha=0.22;ctx.drawImage(p,0,0,w*dpr,h*dpr);ctx.globalAlpha=1;};
      p.src=fd.current[idx-1];
    }
  },[dpr]);

  useEffect(()=>{
    if(!isPlaying){renderF(current,W,H);renderOnion(current,showOnion,W,H);}
  },[current,showOnion,W,H,renderF,renderOnion,isPlaying]);

  // Set up canvas physical size on mount and W/H change
  useEffect(()=>{
    [drawC,playC,onionC].forEach(ref=>{
      const c=ref.current;if(!c)return;
      c.width=W*dpr;c.height=H*dpr;
      const ctx=c.getContext("2d");ctx.scale(dpr,dpr);
    });
    renderF(current,W,H);renderOnion(current,showOnion,W,H);
  },[W,H,dpr]);

  // Playback
  useEffect(()=>{
    if(!isPlaying){clearTimeout(playTimer.current);return;}
    let idx=0;
    const step=()=>{
      const c=playC.current;if(!c)return;
      const ctx=c.getContext("2d");ctx.clearRect(0,0,W,H);ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
      const data=fd.current[idx];
      const next=()=>{const dur=durs[idx]??Math.round(1000/fps);idx=(idx+1)%frameCount;playTimer.current=setTimeout(step,dur);};
      if(data){const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,W,H);next();};img.onerror=next;img.src=data;}else next();
    };
    step();return()=>clearTimeout(playTimer.current);
  },[isPlaying,fps,frameCount,durs,W,H]);

  const applyRes=(nw,nh)=>{
    const keys=Object.keys(fd.current);
    if(!keys.length){setW(nw);setH(nh);setShowRes(false);return;}
    let done=0;const nd={};
    keys.forEach(k=>{
      const src=fd.current[k];if(!src){chk();return;}
      const off=document.createElement("canvas");off.width=nw;off.height=nh;
      const ctx=off.getContext("2d");ctx.fillStyle=BG;ctx.fillRect(0,0,nw,nh);
      const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,nw,nh);nd[k]=off.toDataURL();chk();};img.onerror=chk;img.src=src;
    });
    function chk(){done++;if(done===keys.length){fd.current=nd;thumbs.current=nd;setW(nw);setH(nh);bump();setShowRes(false);}}
  };

  const isShape=TOOLS.find(t=>t.id===tool)?.shape;

  // Touch/mouse position helper — accounts for dpr via CSS size
  const gp=e=>{
    const r=drawC.current.getBoundingClientRect();
    const sx=W/r.width,sy=H/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
  };

  const startDraw=e=>{
    if(isPlaying)return;e.preventDefault();
    const pos=gp(e);
    if(tool==="fill"){floodFill(drawC.current.getContext("2d"),pos.x,pos.y,color,W,H);saveF(current);return;}
    drawing.current=true;lastP.current=pos;
    if(isShape){shapeStart.current=pos;snapshotBefore.current=drawC.current.toDataURL();return;}
    const ctx=drawC.current.getContext("2d");
    if(tool==="brush"){
      for(let i=0;i<16;i++){
        const angle=Math.random()*Math.PI*2,r=Math.random()*size*2;
        ctx.beginPath();ctx.arc(pos.x+Math.cos(angle)*r,pos.y+Math.sin(angle)*r,size*0.3,0,Math.PI*2);
        ctx.fillStyle=color;ctx.fill();
      }
    }else{
      ctx.beginPath();ctx.arc(pos.x,pos.y,size/2,0,Math.PI*2);
      ctx.fillStyle=tool==="eraser"?BG:color;ctx.fill();
    }
  };

  const onDraw=e=>{
    if(!drawing.current||isPlaying)return;e.preventDefault();
    const pos=gp(e),ctx=drawC.current.getContext("2d");
    if(isShape){
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,W,H);ctx.drawImage(img,0,0,W,H);drawShape(ctx,tool,shapeStart.current.x,shapeStart.current.y,pos.x,pos.y,color,size);};
      img.src=snapshotBefore.current;return;
    }
    if(tool==="brush"){
      const dx=pos.x-lastP.current.x,dy=pos.y-lastP.current.y,dist=Math.sqrt(dx*dx+dy*dy);
      const steps=Math.max(1,Math.floor(dist/5));
      for(let s=0;s<=steps;s++){
        const tx=lastP.current.x+dx*(s/steps),ty=lastP.current.y+dy*(s/steps);
        for(let i=0;i<8;i++){
          const angle=Math.random()*Math.PI*2,r=Math.random()*size*2;
          ctx.beginPath();ctx.arc(tx+Math.cos(angle)*r,ty+Math.sin(angle)*r,size*0.3,0,Math.PI*2);
          ctx.fillStyle=color;ctx.fill();
        }
      }
    }else{
      ctx.beginPath();ctx.moveTo(lastP.current.x,lastP.current.y);ctx.lineTo(pos.x,pos.y);
      ctx.strokeStyle=tool==="eraser"?BG:color;ctx.lineWidth=size;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();
    }
    lastP.current=pos;
  };

  const endDraw=e=>{
    if(!drawing.current)return;
    if(isShape&&e){
      const pos=gp(e),ctx=drawC.current.getContext("2d");
      const img=new Image();
      img.onload=()=>{ctx.clearRect(0,0,W,H);ctx.drawImage(img,0,0,W,H);drawShape(ctx,tool,shapeStart.current.x,shapeStart.current.y,pos.x,pos.y,color,size);drawing.current=false;saveF(current);};
      img.src=snapshotBefore.current;return;
    }
    drawing.current=false;saveF(current);
  };

  const switchF=idx=>{saveF(current);setCurrent(idx);};

  const addFrame=()=>{
    if(frameCount>=MAX_FRAMES)return;
    saveF(current);
    const ni=current+1,nfd={},nth={};
    for(let k=0;k<frameCount;k++){const ki=k>=ni?k+1:k;if(fd.current[k]){nfd[ki]=fd.current[k];nth[ki]=thumbs.current[k];}}
    fd.current=nfd;thumbs.current=nth;
    setDurs(d=>{const n=[...d];n.splice(ni,0,null);return n;});
    setFrameCount(fc=>fc+1);setCurrent(ni);
  };

  const deleteFrame=()=>{
    if(frameCount<=1)return;const di=current,nfd={},nth={};
    for(let k=0;k<frameCount;k++){if(k===di)continue;const ki=k>di?k-1:k;if(fd.current[k]){nfd[ki]=fd.current[k];nth[ki]=thumbs.current[k];}}
    fd.current=nfd;thumbs.current=nth;
    setDurs(d=>{const n=[...d];n.splice(di,1);return n;});
    setFrameCount(fc=>fc-1);
    const nc=Math.min(di,frameCount-2);setCurrent(nc);
    setTimeout(()=>renderF(nc,W,H),30);
  };

  const clearFrame=()=>{
    const ctx=drawC.current.getContext("2d");ctx.clearRect(0,0,W,H);
    delete fd.current[current];delete thumbs.current[current];bump();
  };

  const saveLocal=()=>{
    saveF(current);
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify({frameCount,fps,W,H,durs,frames:Object.fromEntries(Array.from({length:frameCount},(_,i)=>[i,fd.current[i]??null]))}));
      flash("保存しました");
    }catch{flash("保存失敗",false);}
  };
  const loadLocal=()=>{
    const raw=localStorage.getItem(STORAGE_KEY);if(!raw){flash("データなし",false);return;}
    try{
      const p=JSON.parse(raw),fc=p.frameCount||1;fd.current={};thumbs.current={};
      for(let i=0;i<fc;i++)if(p.frames[i]){fd.current[i]=p.frames[i];thumbs.current[i]=p.frames[i];}
      setFrameCount(fc);setDurs(p.durs||Array(fc).fill(null));
      if(p.fps)setFps(p.fps);if(p.W&&p.H){setW(p.W);setH(p.H);}
      setCurrent(0);bump();flash("読み込みました");
    }catch{flash("読み込み失敗",false);}
  };
  const exportJSON=()=>{
    saveF(current);
    const p={frameCount,fps,W,H,durs,frames:Object.fromEntries(Array.from({length:frameCount},(_,i)=>[i,fd.current[i]??null]))};
    const url=URL.createObjectURL(new Blob([JSON.stringify(p)],{type:"application/json"}));
    const a=document.createElement("a");a.href=url;a.download="flipbook.json";a.click();URL.revokeObjectURL(url);
  };
  const importJSON=file=>{
    const r=new FileReader();r.onload=e=>{
      try{
        const p=JSON.parse(e.target.result),fc=p.frameCount||1;fd.current={};thumbs.current={};
        for(let i=0;i<fc;i++)if(p.frames[i]){fd.current[i]=p.frames[i];thumbs.current[i]=p.frames[i];}
        setFrameCount(fc);setDurs(p.durs||Array(fc).fill(null));
        if(p.fps)setFps(p.fps);if(p.W&&p.H){setW(p.W);setH(p.H);}
        setCurrent(0);bump();flash("インポートしました");
      }catch{flash("失敗",false);}
    };r.readAsText(file);
  };
  const handleExport=async()=>{
    saveF(current);setExporting(true);setExportPct(0);
    await doExport(fd.current,frameCount,durs,fps,W,H,p=>setExportPct(p),()=>{setExporting(false);flash("書き出し完了");},e=>{setExporting(false);flash("エラー: "+e,false);});
  };

  const defDur=Math.round(1000/fps);
  const cursorStyle=isShape?"crosshair":tool==="eraser"?"cell":"crosshair";

  // Close popups on outside tap
  const closePopups=()=>{setShowRes(false);setShowSizePanel(false);setShowColorPanel(false);};

  return(
    <div style={{height:"100%",background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden",padding:"env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0)"}}>

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",
          background:toast.ok?"#f0fdf4":"#fef2f2",color:toast.ok?"#15803d":"#dc2626",
          padding:"8px 18px",borderRadius:22,fontSize:14,fontWeight:500,
          border:`1px solid ${toast.ok?"#bbf7d0":"#fecaca"}`,
          zIndex:9999,pointerEvents:"none",whiteSpace:"nowrap",
          boxShadow:"0 2px 12px rgba(0,0,0,0.12)"}}>
          {toast.msg}
        </div>
      )}

      {/* ── Top toolbar ── */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,
        padding:"0 16px",height:56,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>

        {/* File ops */}
        <Btn onClick={saveLocal}>💾</Btn>
        <Btn onClick={loadLocal}>📂</Btn>
        <Btn onClick={exportJSON}>↓</Btn>
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",
          height:44,width:44,background:C.panel,border:`1px solid ${C.border}`,
          borderRadius:10,cursor:"pointer",fontSize:16,flexShrink:0}}>
          ↑<input type="file" accept=".json" style={{display:"none"}}
            onChange={e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value="";}}/>
        </label>

        <div style={{width:1,height:24,background:C.border,margin:"0 4px"}}/>

        {/* Resolution */}
        <div style={{position:"relative"}}>
          <Btn onClick={()=>{setShowRes(p=>!p);setShowSizePanel(false);setShowColorPanel(false);}}>
            ⊡ {W}×{H}
          </Btn>
          {showRes&&(
            <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,zIndex:300,
              background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,padding:8,
              minWidth:180,boxShadow:"0 8px 24px rgba(0,0,0,0.12)"}}>
              {PRESETS.map(p=>(
                <div key={p.label} onClick={()=>applyRes(p.w,p.h)} style={{
                  padding:"10px 14px",borderRadius:8,cursor:"pointer",fontSize:14,
                  background:W===p.w&&H===p.h?"#eff6ff":"transparent",
                  color:W===p.w&&H===p.h?C.blue:C.text}}>
                  {p.label}
                </div>
              ))}
              <div style={{borderTop:`1px solid ${C.border}`,marginTop:6,paddingTop:8,display:"flex",gap:6,alignItems:"center",paddingLeft:4}}>
                <input type="number" value={customW} onChange={e=>setCustomW(Number(e.target.value))} style={{width:60}}/>
                <span style={{color:C.hint,fontSize:13}}>×</span>
                <input type="number" value={customH} onChange={e=>setCustomH(Number(e.target.value))} style={{width:60}}/>
                <Btn onClick={()=>applyRes(customW,customH)} style={{height:36,fontSize:13}}>適用</Btn>
              </div>
            </div>
          )}
        </div>

        {/* Onion toggle */}
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
          padding:"0 12px",height:44,borderRadius:10,fontSize:14,color:C.muted,
          background:showOnion?"#eff6ff":C.panel,
          border:`1px solid ${showOnion?C.blue:C.border}`}}>
          <input type="checkbox" checked={showOnion} onChange={e=>setShowOnion(e.target.checked)} style={{display:"none"}}/>
          オニオン
        </label>

        <div style={{flex:1}}/>

        {/* Playback */}
        <button onClick={()=>setIsPlaying(p=>!p)} style={{
          display:"flex",alignItems:"center",gap:6,height:44,padding:"0 20px",
          background:isPlaying?C.redBg:"#eff6ff",
          border:`1px solid ${isPlaying?C.red:C.blue}`,
          borderRadius:10,color:isPlaying?C.red:C.blue,fontSize:15,fontWeight:600}}>
          {isPlaying?"⏹":"▶"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 4px"}}>
          <span style={{fontSize:12,color:C.hint}}>FPS</span>
          <input type="range" min={1} max={24} value={fps} onChange={e=>setFps(Number(e.target.value))}
            style={{width:72,accentColor:C.blue}}/>
          <span style={{fontSize:13,color:C.muted,minWidth:18}}>{fps}</span>
        </div>

        <div style={{width:1,height:24,background:C.border,margin:"0 4px"}}/>

        <Btn onClick={handleExport} primary disabled={exporting}>
          {exporting?`${exportPct}%`:"▶ 書き出し"}
        </Btn>
      </div>

      {/* ── Body ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden",gap:0}} onClick={closePopups}>

        {/* Left sidebar: tools */}
        <div style={{width:72,background:C.panel,borderRight:`1px solid ${C.border}`,
          display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"10px 0",
          overflowY:"auto",flexShrink:0}} onClick={e=>e.stopPropagation()}>

          {/* Tools */}
          {TOOLS.map(t=>(
            <ToolBtn key={t.id} label={t.label} active={tool===t.id}
              onClick={()=>setTool(t.id)} title={t.title}/>
          ))}

          <div style={{width:40,height:1,background:C.border,margin:"4px 0"}}/>

          {/* Size picker */}
          <div style={{position:"relative"}}>
            <button onClick={()=>{setShowSizePanel(p=>!p);setShowColorPanel(false);setShowRes(false);}} style={{
              width:52,height:52,display:"flex",flexDirection:"column",alignItems:"center",
              justifyContent:"center",gap:3,background:showSizePanel?C.blueBg:"transparent",
              border:`1.5px solid ${showSizePanel?C.blue:C.border}`,borderRadius:10,color:C.muted,
            }}>
              <div style={{width:Math.min(size*2,32),height:Math.min(size*2,12),borderRadius:99,
                background:C.muted,minWidth:4,minHeight:4}}/>
              <span style={{fontSize:10,color:C.hint}}>{size}px</span>
            </button>
            {showSizePanel&&(
              <div style={{position:"absolute",left:"calc(100% + 8px)",top:0,zIndex:300,
                background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,
                padding:10,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",
                display:"flex",flexDirection:"column",gap:6,minWidth:140}}>
                {SIZES.map(s=>(
                  <div key={s} onClick={()=>{setSize(s);setShowSizePanel(false);}} style={{
                    display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,
                    cursor:"pointer",background:size===s?"#eff6ff":"transparent",
                    border:`1px solid ${size===s?C.blue:"transparent"}`,
                  }}>
                    <div style={{width:Math.min(s*2,40),height:Math.min(s,14),borderRadius:99,
                      background:size===s?C.blue:C.muted,minWidth:4,minHeight:4}}/>
                    <span style={{fontSize:13,color:size===s?C.blue:C.muted,minWidth:32}}>{s}px</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Color picker */}
          <div style={{position:"relative"}}>
            <button onClick={()=>{setShowColorPanel(p=>!p);setShowSizePanel(false);setShowRes(false);}} style={{
              width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",
              background:"transparent",border:`1.5px solid ${showColorPanel?C.blue:C.border}`,borderRadius:10,
            }}>
              <div style={{width:32,height:32,borderRadius:8,background:color,border:`1px solid ${C.border}`}}/>
            </button>
            {showColorPanel&&(
              <div style={{position:"absolute",left:"calc(100% + 8px)",top:0,zIndex:300,
                background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,padding:12,
                boxShadow:"0 8px 24px rgba(0,0,0,0.12)",width:180}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:10}}>
                  {SWATCHES.map(c=>(
                    <div key={c} onClick={()=>setColor(c)} style={{
                      width:"100%",paddingBottom:"100%",borderRadius:8,background:c,cursor:"pointer",
                      outline:color===c?`3px solid ${C.blue}`:"none",outlineOffset:2,
                      border:`1px solid ${C.border}`,
                    }}/>
                  ))}
                </div>
                <div style={{position:"relative",height:44,borderRadius:8,background:color,
                  border:`1px solid ${C.border}`,overflow:"hidden"}}>
                  <input type="color" value={color} onChange={e=>setColor(e.target.value)}
                    style={{position:"absolute",inset:0,opacity:0,width:"100%",height:"100%",cursor:"pointer"}}/>
                  <span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:12,color:"#fff",pointerEvents:"none",
                    textShadow:"0 1px 2px rgba(0,0,0,0.5)"}}>カスタム</span>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Center: canvas */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",padding:10,gap:8}}>

          {/* Frame info + duration row */}
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <span style={{fontSize:13,color:C.muted,minWidth:100}}>フレーム {current+1} / {frameCount}</span>
            <span style={{fontSize:12,color:C.hint}}>表示時間</span>
            <input type="range" min={16} max={2000} step={8}
              value={durs[current]??defDur}
              onChange={e=>setDurs(d=>{const n=[...d];n[current]=parseInt(e.target.value);return n;})}
              style={{flex:1,accentColor:C.blue}}/>
            <input type="number" min={16} max={5000} step={8}
              value={durs[current]??defDur}
              onChange={e=>setDurs(d=>{const n=[...d];n[current]=Math.max(16,parseInt(e.target.value)||defDur);return n;})}
              style={{width:66,textAlign:"right"}}/>
            <span style={{fontSize:12,color:C.hint}}>ms</span>
            <button onClick={()=>setDurs(d=>{const n=[...d];n[current]=null;return n;})}
              style={{height:36,width:36,background:C.panel,border:`1px solid ${C.border}`,
                borderRadius:8,fontSize:14,color:C.muted,flexShrink:0}}>↺</button>
          </div>

          {/* Canvas container — fills remaining space */}
          <div style={{flex:1,position:"relative",borderRadius:12,overflow:"hidden",
            border:`1px solid ${C.border}`,background:BG,
            display:"flex",alignItems:"stretch"}}>
            <canvas ref={onionC} width={W*dpr} height={H*dpr}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>
            <canvas ref={drawC} width={W*dpr} height={H*dpr}
              style={{position:"relative",width:"100%",height:"100%",
                touchAction:"none",cursor:cursorStyle,background:"transparent",display:isPlaying?"none":"block"}}
              onMouseDown={startDraw} onMouseMove={onDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
              onTouchStart={startDraw} onTouchMove={onDraw} onTouchEnd={endDraw}/>
            <canvas ref={playC} width={W*dpr} height={H*dpr}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",display:isPlaying?"block":"none"}}/>
          </div>

          {/* Frame action buttons */}
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>current>0&&switchF(current-1)}
              style={{height:44,width:44,background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,fontSize:18,color:C.muted,flexShrink:0}}>◀</button>
            <button onClick={()=>current<frameCount-1&&switchF(current+1)}
              style={{height:44,width:44,background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,fontSize:18,color:C.muted,flexShrink:0}}>▶</button>
            <Btn onClick={addFrame} style={{flex:1}}>＋ 追加</Btn>
            <Btn onClick={deleteFrame} danger style={{flex:1}}>✕ 削除</Btn>
            <Btn onClick={clearFrame} style={{flex:1}}>⌫ クリア</Btn>
          </div>
        </div>

        {/* Right sidebar: filmstrip */}
        <div style={{width:100,background:C.panel,borderLeft:`1px solid ${C.border}`,
          display:"flex",flexDirection:"column",padding:8,gap:6,flexShrink:0}}>
          <div style={{fontSize:11,color:C.hint,textAlign:"center",letterSpacing:"0.08em",flexShrink:0}}>FRAMES</div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:5}}>
            {Array.from({length:frameCount},(_,i)=>(
              <div key={`${i}-${thumbVer}`} onClick={()=>switchF(i)} style={{
                position:"relative",borderRadius:6,overflow:"hidden",cursor:"pointer",flexShrink:0,
                border:`2px solid ${current===i?C.blue:C.border}`,
                background:BG,aspectRatio:`${W}/${H}`,
                boxShadow:current===i?"0 0 0 3px #bfdbfe":"none",
              }}>
                {thumbs.current[i]
                  ?<img src={thumbs.current[i]} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} alt=""/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:C.hint,fontSize:10}}>—</div>
                }
                <div style={{position:"absolute",bottom:2,right:3,fontSize:9,
                  color:current===i?C.blue:C.hint,lineHeight:1,fontWeight:600}}>{i+1}</div>
                {durs[i]!=null&&<div style={{position:"absolute",top:2,left:3,fontSize:8,
                  color:"#d97706",lineHeight:1}}>{durs[i]}</div>}
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
